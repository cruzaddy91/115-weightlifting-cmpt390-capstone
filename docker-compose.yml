services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weightlifting_db}
      POSTGRES_USER: ${POSTGRES_USER:-weightlifting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weightlifting_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weightlifting_user} -d ${POSTGRES_DB:-weightlifting_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./115-weightlifting/src/backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://weightlifting_user:weightlifting_password@postgres:5432/weightlifting_db}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173}
      SEED_DEMO: ${SEED_DEMO:-true}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-Passw0rd!123}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./115-weightlifting/src/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
